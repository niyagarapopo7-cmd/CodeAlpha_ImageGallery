<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Asher Image Gallery</h1>

    <!-- Filter Buttons -->
    <div class="filter-buttons">
        <button onclick="filterImages('all')">All</button>
        <button onclick="filterImages('nature')">Nature</button>
        <button onclick="filterImages('city')">City</button>
    </div>

    <div class="gallery">
    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470" class="gallery-item nature" onclick="openLightbox(0)">
    
    <img src="https://images.unsplash.com/photo-1467269204594-9661b134dd2b" class="gallery-item city" onclick="openLightbox(1)">
    
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" class="gallery-item nature" onclick="openLightbox(2)">
    
    <img src="https://images.unsplash.com/photo-1494526585095-c41746248156" class="gallery-item city" onclick="openLightbox(3)">
    
    <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e" class="gallery-item nature" onclick="openLightbox(4)">
    
    <img src="https://images.unsplash.com/photo-1508057198894-247b23fe5ade" class="gallery-item city" onclick="openLightbox(5)">
</div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">
        <span class="close" onclick="closeLightbox()">&times;</span>
        <img class="lightbox-img" id="lightbox-img">

        <button class="prev" onclick="changeSlide(-1)">❮</button>
        <button class="next" onclick="changeSlide(1)">❯</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
